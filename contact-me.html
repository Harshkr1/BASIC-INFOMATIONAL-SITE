<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Me - Node.js Server</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #0f172a;
        color: #e2e8f0;
        text-align: center;
        padding: 40px;
      }

      .box {
        background-color: #1e293b;
        padding: 25px;
        border-radius: 10px;
        margin: 20px auto;
        max-width: 600px;
      }

      h1 {
        color: #38bdf8;
      }

      input,
      textarea {
        width: 90%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 5px;
        border: none;
      }

      button {
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        background-color: #38bdf8;
        color: black;
        font-weight: bold;
        cursor: pointer;
      }

      button:hover {
        background-color: #facc15;
      }
    </style>
  </head>

  <body>
    <h1>Contact Me</h1>

    <div class="box">
      <p>This is a simple contact page for the Node.js server project.</p>
    </div>
  </body>
</html>
