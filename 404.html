<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            text-align: center;
            padding: 60px;
        }

        .box {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 10px;
            max-width: 600px;
            margin: auto;
        }

        h1 {
            font-size: 60px;
            color: #ef4444;
            margin-bottom: 10px;
        }

        h2 {
            color: #38bdf8;
        }

        p {
            margin: 15px 0;
        }

        a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            color: #facc15;
        }
    </style>
</head>

<body>

    <div class="box">
        <h1>404</h1>
        <h2>Page Not Found 🚫</h2>

        <p>
            The page you are looking for does not exist or has been moved.
        </p>

        <p>
            Try going back to the homepage.
        </p>
    </div>

</body>
</html>
